apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-api
  template:
    metadata:
      labels:
        app: web-api
    spec:
      containers:
        - name: php-container
          image: mi-api-php:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: api-php-service
spec:
  type: NodePort
  selector:
    app: web-api
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
